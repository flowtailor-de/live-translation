audio:
  device: MacBook Pro-Mikrofon
  sample_rate: 16000
  channels: 1
  input_channel: 1
  chunk_duration: 0.1
vad:
  threshold: 0.5
  min_speech_duration: 0.3
  word_silence_duration: 0.4
  sentence_silence_duration: 1.0
  max_speech_duration: 15.0
  speech_pad_duration: 0.2
stt:
  model: small
  language: de
  device: mlx
  compute_type: int8
translation:
  # backend selects the engine:
  #   nllb / translategemma-mlx / translategemma  -> local, offline pipeline
  #   gemini-live                                 -> online Gemini Live Translate
  backend: translategemma-mlx
  source_lang: de
  target_lang: fa
  device: mps
  translategemma-mlx:
    model: mlx-community/translategemma-4b-it-4bit
    max_new_tokens: 256
  translategemma:
    model: google/translategemma-4b-it
    max_new_tokens: 256
  nllb:
    model: facebook/nllb-200-distilled-600M
    max_length: 512
tts:
  model: fa_IR-amir-medium
  speaker_id: 0
  length_scale: 1.0
# Used only when translation.backend == gemini-live.
# Source language is auto-detected; target_lang above sets the output language.
# Requires GEMINI_API_KEY in your .env file.
gemini:
  model: gemini-3.5-live-translate-preview
  echo_target_language: true   # parrot audio that is already in the target language
  vad_gating: true             # only stream audio during speech (skip paying for silence)
  gate_pre_roll: 0.3           # seconds of audio kept before speech onset (avoids clipping)
  gate_hangover: 0.8           # seconds to keep streaming after speech stops
server:
  host: 0.0.0.0
  port: 8000
  buffer_size: 5
pipeline:
  max_workers: 2
  max_queue_size: 10
